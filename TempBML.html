<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึก Lab อัจฉริยะ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            color: #00338D;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #00338D, #34495e);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 1.4rem; line-height: 1.4; }
        
        .session-banner {
            background-color: #f39c12;
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .session-banner.active-morn { background-color: #27ae60; }
        .session-banner.active-eve { background-color: #8e44ad; }
        .session-banner.inactive { background-color: #393939; }

        .content {
            padding: 20px;
            flex-grow: 1;
        }

        /* ----- Login ----- */
        #view-login {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 20px; text-align: center;
        }
        #view-login h2 { color: #00338D; margin-bottom: 10px; }
        .login-input {
            width: 100%; max-width: 300px; padding: 15px; font-size: 1.2rem;
            text-align: center; border: 2px solid #bdc3c7; border-radius: 8px; margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .login-input:focus { border-color: #3498db; outline: none; }
        .btn-login {
            width: 100%; max-width: 300px; background-color: #00338D; color: white;
            border: none; padding: 15px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }
        .btn-login:hover { background-color: #3498db; }

        /* ----- Dashboard ----- */
        .recorder-info {
            background-color: #ecf0f1; padding: 15px; border-radius: 8px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .recorder-name { font-size: 1.1rem; font-weight: bold; color: #2c3e50; }
        .btn-logout {
            background-color: #EA2839; color: white; border: none; padding: 6px 12px;
            border-radius: 5px; cursor: pointer; font-size: 0.85rem;
        }

        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .room-card {
            background-color: #fff; border: 2px solid #bdc3c7; border-radius: 10px;
            padding: 15px 10px; text-align: center; cursor: pointer; transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .room-card:hover:not(.disabled) { border-color: #00338D; background-color: #ebf5fb; transform: translateY(-3px); }
        .room-card.disabled { cursor: not-allowed; opacity: 0.8; }
        .room-card.completed { border-color: #2ecc71; background-color: #eafaf1; }
        .room-card.completed h3 { color: #27ae60; }
        .room-card.completed .status-badge { background-color: #2ecc71; }
        .room-card.locked { border-color: #e67e22; background-color: #fdf2e9; }
        .room-card.locked h3 { color: #d35400; }
        .room-card.locked .status-badge { background-color: #e67e22; }

        .room-icon { font-size: 1.8rem; margin-bottom: 8px; }
        .room-card h3 { margin: 0; font-size: 1rem; color: #2c3e50; line-height: 1.3;}
        .status-badge {
            font-size: 0.8rem; margin-top: 8px; padding: 4px 10px;
            border-radius: 12px; background-color: #bdc3c7; color: white; line-height: 1.2;
        }

        #view-dashboard, #view-room { display: none; }
        
        .room-header {
            font-size: 1.3rem; color: #00338D; border-bottom: 2px solid #3498db;
            padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; font-weight:bold;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        .form-group input {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 6px; box-sizing: border-box; font-size: 1rem; transition: background-color 0.3s;
        }
        
        /* สไตล์แจ้งเตือนตอนกรอกค่า Validations */
        .input-warning { background-color: #ffb3b3 !important; color: #d35400 !important; }
        .input-warning-low { background-color: #aed6f1 !important; color: blue !important; } /* สีฟ้า (ค่าต่ำกว่าปกติ) */
        .input-error { background-color: #000000 !important; color: #ffffff !important; }

        .section-title {
            background-color: #ecf0f1; padding: 8px 10px; border-left: 4px solid #e67e22; margin: 25px 0 15px 0;
            font-weight: bold; color: #d35400; display: flex; justify-content: space-between; align-items: center;
        }

        .add-equip-btn {
            background-color: #f39c12; color: white; border: none; padding: 6px 12px;
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.85rem;
        }
        
        .equip-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-remove-eq {
            background: #EA2839; color: white; border: none; border-radius: 5px;
            cursor: pointer; padding: 0 12px; font-size: 1.2rem; display:flex; align-items:center; justify-content:center;
        }

        .action-buttons { display: flex; gap: 10px; margin-top: 30px; }
        .btn-save { flex: 2; background-color: #00338D; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn-cancel { flex: 1; background-color: #EA2839; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        #overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.9); display: none;
            justify-content: center; align-items: center; flex-direction: column; z-index: 9999;
        }
        .spinner {
            border: 5px solid #f3f3f3; border-top: 5px solid #3498db;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 400px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="overlay">
            <div class="spinner"></div>
            <h2 id="overlay-text" style="color:#00338D;">กำลังประมวลผล...</h2>
        </div>

        <div style="text-align: center; padding-top: 10px; margin-bottom: 15px;">
        <img src="https://storage.googleapis.com/nh-uat-corp/2024/6/update_N_Health_d5a05fd0a9/update_N_Health_d5a05fd0a9.png" alt="N Health Logo" style="max-height: 70px; width: auto; object-fit: contain;">
        </div>

        <div class="header">
            <h1>ระบบบันทึกอุณหภูมิและความชื้น<br><small style="font-weight:normal; font-size:1rem;">Molecular Laboratory</small></h1>
        </div>
        <div id="session-banner" class="session-banner">กำลังตรวจสอบเวลา...</div>

        <div class="content">
            <!-- ================= VIEW 1: LOGIN ================= -->
            <div id="view-login">
                <h2>🔐 เข้าสู่ระบบ</h2>
                <p>กรุณากรอกรหัสพนักงาน 6 หลัก เพื่อเริ่มบันทึก</p>
                <input type="text" id="empId" class="login-input" maxlength="6" placeholder="รหัสพนักงาน">
                <button class="btn-login" onclick="login()">เข้าสู่ระบบ</button>
            </div>

            <!-- ================= VIEW 2: DASHBOARD ================= -->
            <div id="view-dashboard">
                <div class="recorder-info">
                    <div>
                        <span style="color:#7f8c8d; font-size:0.9rem;">ผู้บันทึกข้อมูล:</span><br>
                        <span id="display-recorder-name" class="recorder-name">ชื่อ นามสกุล</span>
                    </div>
                    <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
                </div>
                
                <style>
                    /* สไตล์สำหรับปุ่มลิงก์เมนู (ปุ่มจะลอยขึ้นเล็กน้อยและเปลี่ยนสีตอน Hover) */
                    .menu-link-btn {
                        color: white !important;
                        padding: 10px 15px;
                        border-radius: 6px;
                        text-decoration: none;
                        font-size: 0.95rem;
                        font-weight: bold;
                        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
                        transition: all 0.3s ease;
                    }
                    
                    .menu-btn-map { background-color: #00338D; }
                    .menu-btn-map:hover { background-color: #001f5c; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }

                    .menu-btn-dash { background-color: #3498db; }
                    .menu-btn-dash:hover { background-color: #2980b9; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }

                    .menu-btn-main { background-color: #2c3e50; }
                    .menu-btn-main:hover { background-color: #939393; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }

                    .menu-btn-sum { background-color: #e67e22; }
                    .menu-btn-sum:hover { background-color: #d35400; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
                </style>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background-color: #f8f9fa; padding: 10px; border-radius: 8px; border-left: 4px solid #00338D; flex-wrap: wrap; gap: 10px;">
                    <h3 style="margin-top:0; margin-bottom:0; color: #2c3e50;">เลือกหน้าต่าง</h3>
                    
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        
                        <!--<a href="https://rb508411.github.io/bml_temp/TempBML.html" target="_blank" class="menu-link-btn menu-btn-main">
                            🏠 กลับหน้าบันทึกหลัก
                        </a>-->
        
                        <a href="https://rb508411.github.io/bml_temp/BML_map.html" target="_blank" class="menu-link-btn menu-btn-map">
                            🗺️ แผนผังห้อง
                        </a>
                        <a href="https://rb508411.github.io/bml_temp/BML_dashboard.html" target="_blank" class="menu-link-btn menu-btn-dash">
                            📊 Dashboard กราฟ
                        </a>
                        <a href="https://rb508411.github.io/bml_temp/Summarize_BML.html" target="_blank" class="menu-link-btn menu-btn-sum">
                            📝 รายงานสรุป
                        </a>
                    </div>
                </div>
                <div class="grid-container" id="room-grid">
                    <!-- จะถูกสร้างด้วย JavaScript -->
                </div>
            </div>
            <!-- ================= VIEW 3: ROOM FORM ================= -->


            <div id="view-room">
                <div class="room-header">
                    <span id="room-title">Lab X</span>
                    <span id="timer" style="font-size: 1rem; color: #EA2839;">⏱️ 05:00</span>
                </div>
                
                <form id="room-form">
                    <div class="form-group">
                        <label>🌡️ อุณหภูมิห้อง (°C) <span style="color:#EA2839;">*</span></label>
                        <!-- เพิ่ม oninput -->
                        <input type="number" id="room-temp" step="0.1" oninput="validateRoom(this, 'temp')" required>
                    </div>
                    <div class="form-group">
                        <label>💧 ความชื้นห้อง (%) <span style="color:#EA2839;">*</span></label>
                        <!-- เพิ่ม oninput -->
                        <input type="number" id="room-hum" step="0.1" oninput="validateRoom(this, 'hum')" required>
                    </div>

                    <div class="section-title">
                        <span>เครื่องมือในห้อง</span>
                        <button type="button" class="add-equip-btn" onclick="addEquipField()">+ เพิ่มเครื่อง</button>
                    </div>
                    
                    <div id="equip-container"></div>
                    
                    <div class="form-group" style="margin-top: 20px; background-color: #fdf2e9; padding: 15px; border-radius: 8px; border-left: 4px solid #e67e22;">
                        <label style="color: #d35400;">⚠️ ค่าเกินเกณฑ์ที่ยอมรับหรือไม่? (ถ้าเกินระบุการแก้ไข)</label>
                        <input type="text" id="room-action" placeholder="เช่น อุณหภูมิตู้เย็นเกินเกณฑ์ -> ปรับอุณหภูมิและแจ้งช่าง">
                    </div>

                    <div class="action-buttons">
                        <button type="button" class="btn-cancel" onclick="cancelRoom()">ยกเลิก / ปลดล็อก</button>
                        <button type="button" class="btn-save" onclick="saveRoom()">💾 บันทึกและส่งข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // *** ให้นำ URL ของ Google Apps Script มาใส่ตรงนี้ ***
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWYzohslXOIFKacZ_4UcFQrJ5WL_FE8FWuresqT3_TkpciFBrGXM_wIY1a2l5A5TE/exec";

        const LAB_CONFIG = {
            "Cobas 4800 Zone": [
                "ตู้เย็น (BML-MOL-139)"
            ], 
            "Post PCR Room": [], 
            "PCR Room I (หน้าห้อง Post PCR)": [
                "ตู้เย็น (BML-MOL-211)"
            ],
            "PCR Mix Room": [],
            "PCR Room I (หน้าห้อง MMX)": [
                "ตู้เย็น (NML00013)",
                "ตู้เย็น -20 °C (NML00443)",
                "ตู้เย็น -20 °C (NML00007)",
                "ตู้เย็น -20 °C (NML00006)",
                "ตู้เย็น -70 °C (BML-MOL-220)"
            ],
            "MMX Room": [
                "ตู้เย็น (NML00009)",
                "ตู้เย็น -20 °C (NML00009)"
            ],
            "Sample Preparation Room": [
                "ตู้เย็น (NML00011)",
                "ตู้เย็น (NML00442)",
                "ตู้เย็น -20 °C (NML00442)",
                "ตู้เย็น -30 °C (NML00004)"
            ],
            "BSL-2 Room": [
                "ตู้เย็น -70 °C (BML-MOL-125)",
                "ตู้เย็น -70 °C (BML-MOL-124)"
            ],
            "Stock Room": [],
            "PCR Room II": [],
            "Cobas 6800 Room": [],
            "Library Preparation": [],
            "Sequencing Room": [],
            "Analysis Room": []
        };

        let currentSessionName = null;
        let currentEditingRoom = null;
        let refreshInterval = null;
        let lockTimer = null;
        let sessionData = {}; 
        let currentUser = "";
        
        function showOverlay(text) {
            document.getElementById('overlay-text').innerText = text;
            document.getElementById('overlay').style.display = 'flex';
        }
        function hideOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }

        // ================= Validation Rules =================
        function getValidationRules(name) {
            const lowerName = name.toLowerCase();
            if (lowerName.includes("-70")) return { minAllow: -85, maxAllow: 0, minNorm: -75, maxNorm: -65 };
            if (lowerName.includes("-20")) return { minAllow: -50, maxAllow: 0, minNorm: -35, maxNorm: -15 };
            if (lowerName.includes("-30")) return { minAllow: -50, maxAllow: 0, minNorm: -40, maxNorm: -20 };
            if (lowerName.includes("ตู้เย็น")) return { minAllow: 0, maxAllow: 20, minNorm: 2, maxNorm: 8 };

            return null; // ไม่มีเกณฑ์
        }

        const ROOM_CRITERIA = {
                temp: { minAllow: 10, maxAllow: 50, minNorm: 18, maxNorm: 25 }, // อุณหภูมิห้อง
                hum:  { minAllow: 10, maxAllow: 100, minNorm: 20, maxNorm: 60 }  // ความชื้นห้อง
            };

        function validateRoom(inputEl, type) {

            inputEl.classList.remove('input-warning', 'input-warning-low', 'input-error');
            const valStr = inputEl.value;
            if (valStr === '') return;

            const val = parseFloat(valStr);
            const rules = ROOM_CRITERIA[type];

            if (val < rules.minAllow || val > rules.maxAllow) {
                inputEl.classList.add('input-error'); // หลุดเกณฑ์บังคับ (สูงหรือต่ำเกินไป) -> สีดำ
            } else if (val > rules.maxNorm) {
                inputEl.classList.add('input-warning'); // สูงกว่าเกณฑ์ปกติ -> สีชมพู
            } else if (val < rules.minNorm) {
                inputEl.classList.add('input-warning-low'); // ต่ำกว่าเกณฑ์ปกติ -> สีฟ้า
            }
        }


        function validateEquip(tempInputEl) {

            const row = tempInputEl.parentElement;
            const nameInputEl = row.querySelector('.eq-name');
            const eqName = nameInputEl.value;
            const tempValStr = tempInputEl.value;


            // เคลียร์สีเดิม
            tempInputEl.classList.remove('input-warning', 'input-warning-low', 'input-error');
            

            
            if (tempValStr === '') return;
            
            const rules = getValidationRules(eqName);
            if (!rules) return;

            const val = parseFloat(tempValStr);

            // เช็คว่าอยู่นอกช่วงบังคับไหม (ห้ามบันทึก -> สีดำ)
            if (val < rules.minAllow || val > rules.maxAllow) {
                tempInputEl.classList.add('input-error'); // หลุดเกณฑ์บังคับ (สูงหรือต่ำเกินไป) -> สีดำ
            } else if (val > rules.maxNorm) {
                tempInputEl.classList.add('input-warning'); // สูงกว่าเกณฑ์ปกติ -> สีชมพู
            } else if (val < rules.minNorm) {
                tempInputEl.classList.add('input-warning-low'); // ต่ำกว่าเกณฑ์ปกติ -> สีฟ้า
            }
        }

        


        // ====================================================

        function checkSession() {
            const now = new Date();
            const hour = now.getHours();
            const banner = document.getElementById('session-banner');
            
            if (hour >= 6 && hour < 12) {
                currentSessionName = "MORN";
                banner.innerText = "☀️ เปิดรับข้อมูลรอบเช้า 06:00 - 11:59 น.";
                banner.className = "session-banner active-morn";
            } else if (hour >= 15 && hour < 23) {
                currentSessionName = "EVE";
                banner.innerText = "🌙 เปิดรับข้อมูลรอบเย็น 15:00 - 22:59 น.";
                banner.className = "session-banner active-eve";
            } else {
                currentSessionName = null;
                banner.innerText = "🚫 นอกเวลาการบันทึก (รับเฉพาะ 06-11 น. และ 15-22 น.)";
                banner.className = "session-banner inactive";
                
                // ระบบล็อกแบบ Strict: หากหมดเวลาแล้วมีคนค้างอยู่ในห้อง จะเตะออกและปลดล็อกอัตโนมัติ
                if (currentEditingRoom) {
                    alert("⏰ หมดเวลารับข้อมูลของรอบนี้แล้ว ระบบจะปิดฟอร์มและกลับสู่หน้าหลักอัตโนมัติครับ");
                    cancelRoom(); 
                }
            }
        }

        async function login() {
            const empId = document.getElementById('empId').value.trim();
            if (!empId) {
                alert("กรุณากรอกรหัสพนักงาน");
                return;
            }
            showOverlay("กำลังตรวจสอบรหัส...");
            try {
                const url = `${SCRIPT_URL}?action=login&empId=${encodeURIComponent(empId)}`;
                const response = await fetch(url);
                const result = await response.json();
                if (result.success) {
                    currentUser = result.name;
                    localStorage.setItem('lab_logged_in_user', currentUser);
                    showDashboard();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
            }
            hideOverlay();
        }

        function logout() {
            if(confirm("ต้องการออกจากระบบใช่หรือไม่?")) {
                localStorage.removeItem('lab_logged_in_user');
                currentUser = "";
                clearInterval(refreshInterval);
                document.getElementById('view-dashboard').style.display = 'none';
                document.getElementById('view-login').style.display = 'flex';
                document.getElementById('empId').value = '';
            }
        }

        function showDashboard() {
            document.getElementById('display-recorder-name').innerText = currentUser;
            document.getElementById('view-login').style.display = 'none';
            document.getElementById('view-room').style.display = 'none';
            document.getElementById('view-dashboard').style.display = 'block';
            
            fetchRoomStatus();
            if(!refreshInterval) {
                refreshInterval = setInterval(() => {
                    checkSession();
                    fetchRoomStatus();
                }, 3000);
            }
        }

        async function fetchRoomStatus() {
            if (!currentSessionName) return; 
            try {
                const url = `${SCRIPT_URL}?action=getStatus&session=${currentSessionName}`;
                const response = await fetch(url);
                const statusData = await response.json();
                renderGrid(statusData);
            } catch (error) {
                console.error("Error fetching status");
            }
        }

        function renderGrid(statusData = {}) {
            const grid = document.getElementById('room-grid');
            grid.innerHTML = '';
            const isOutOfTime = (currentSessionName === null);
            const rooms = Object.keys(LAB_CONFIG);

            for (let i = 0; i < rooms.length; i++) {
                const roomName = rooms[i];
                const roomInfo = statusData[roomName] || { status: 'Available', user: '' };
                
                const card = document.createElement('div');
                let icon = '🚪';
                let badgeText = 'ว่าง';
                card.className = 'room-card';

                if (isOutOfTime) {
                    card.classList.add('disabled');
                    card.onclick = () => alert("หมดเวลาบันทึกผลแล้วครับ");
                } 
                else if (roomInfo.status === 'Completed') {
                    card.classList.add('completed', 'disabled');
                    icon = '✅';
                    badgeText = `บันทึกแล้ว<br><small>โดย ${roomInfo.user}</small>`;
                    card.onclick = () => alert(`ห้องนี้ถูกบันทึกแล้วโดย ${roomInfo.user} ครับ`);
                } 
                else if (roomInfo.status === 'Locked') {
                    card.classList.add('locked', 'disabled');
                    icon = '🔒';
                    badgeText = `กำลังจด...<br><small>โดย ${roomInfo.user}</small>`;
                    card.onclick = () => alert(`ห้องนี้กำลังถูกจดบันทึกโดย ${roomInfo.user} โปรดรอสักครู่ครับ`);
                } 
                else {
                    card.onclick = () => requestLockRoom(roomName);
                }

                card.innerHTML = `
                    <div class="room-icon">${icon}</div>
                    <h3>${roomName}</h3>
                    <div class="status-badge">${badgeText}</div>
                `;
                grid.appendChild(card);
            }
        }

        async function requestLockRoom(roomName) {

            if (!currentSessionName) {
                alert("🚫 อยู่นอกเวลาการบันทึกผล ไม่สามารถเข้าห้องได้ครับ");
                return;
            }

            showOverlay(`กำลังเปิดห้อง...`);
            try {
                const url = `${SCRIPT_URL}?action=lock&room=${encodeURIComponent(roomName)}&user=${encodeURIComponent(currentUser)}&session=${currentSessionName}`;
                const response = await fetch(url);
                const result = await response.text();
                
                if (result === "Success") {
                    openRoomForm(roomName);
                } else {
                    alert(result); 
                    fetchRoomStatus(); 
                }
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
            }
            hideOverlay();
        }

        // เพิ่มพารามิเตอร์ isDefault เพื่อแยกว่าเครื่องมือไหนมาจากลิสต์บังคับ
        function addEquipField(name = '', temp = '', isDefault = false) {
            const container = document.getElementById('equip-container');
            const div = document.createElement('div');
            div.className = 'equip-row';
            
            // ถ้าเป็นเครื่องมือจากลิสต์ บังคับแก้ไขชื่อไม่ได้ และปิดปุ่มลบ
            const nameAttr = isDefault ? `readonly style="flex: 3; background-color: #ecf0f1; cursor: not-allowed; border-color: #bdc3c7;"` : `style="flex: 3;"`;
            const btnHtml = isDefault ? `<div style="width: 32px; visibility: hidden;"></div>` : `<button type="button" class="btn-remove-eq" onclick="this.parentElement.remove()">✖</button>`;

            div.innerHTML = `
                <input type="text" placeholder="ชื่อเครื่อง" value="${name}" class="eq-name" oninput="validateEquip(this.nextElementSibling)" ${nameAttr}>
                <input type="number" step="0.1" placeholder="°C" value="${temp}" class="eq-temp" oninput="validateEquip(this)" style="flex: 2;">
                ${btnHtml}
            `;
            container.appendChild(div);
            
            // สั่งตรวจสอบสีทันทีถ้ามีค่าอยู่แล้ว
            const tempInput = div.querySelector('.eq-temp');
            if(temp) validateEquip(tempInput);
        }

        function openRoomForm(roomName) {
            currentEditingRoom = roomName;
            document.getElementById('room-title').innerText = `${roomName}`;
            
            const data = sessionData[roomName] || {};
            document.getElementById('room-temp').value = data.rTemp || '';
            document.getElementById('room-hum').value = data.rHum || '';
            document.getElementById('room-action').value = data.action || '';
            
            const container = document.getElementById('equip-container');
            container.innerHTML = '';
            
            const savedEquips = data.equips || {};
            const defaultEquips = LAB_CONFIG[roomName] || [];
            
            // โหลดเครื่องมือจากลิสต์ตายตัวก่อน (isDefault = true)
            defaultEquips.forEach(eqName => {
                addEquipField(eqName, savedEquips[eqName] || '', true);
                delete savedEquips[eqName]; // ลบออกจาก saved list เพื่อไม่ให้ซ้ำ
            });
            
            // โหลดเครื่องมืออื่นๆ ที่พนักงานกด Add เพิ่มเอง
            Object.keys(savedEquips).forEach(eqName => {
                addEquipField(eqName, savedEquips[eqName] || '', false);
            });

            document.getElementById('view-dashboard').style.display = 'none';
            document.getElementById('view-room').style.display = 'block';
            
            clearInterval(refreshInterval);
            startLockTimer();
        }

        function startLockTimer() {
            let timeLeft = 300; 
            const timerEl = document.getElementById('timer');
            
            clearInterval(lockTimer);
            lockTimer = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const s = (timeLeft % 60).toString().padStart(2, '0');
                timerEl.innerText = `⏱️ ${m}:${s}`;
                
                if (timeLeft <= 0) {
                    clearInterval(lockTimer);
                    alert("หมดเวลาการจดบันทึก (5 นาที) ระบบจะปลดล็อกห้องนี้อัตโนมัติครับ");
                    cancelRoom(); 
                }
            }, 1000);
        }

        async function cancelRoom() {
            clearInterval(lockTimer);
            showOverlay("กำลังปลดล็อกห้อง...");
            try {
                const url = `${SCRIPT_URL}?action=unlock&room=${encodeURIComponent(currentEditingRoom)}&session=${currentSessionName}`;
                await fetch(url);
            } catch(e) {}
            
            currentEditingRoom = null;
            showDashboard();
            hideOverlay();
        }

        async function saveRoom() {

            if (!currentSessionName) {
                alert("🚫 หมดเวลาการบันทึกแล้ว ไม่สามารถส่งข้อมูลได้ครับ");
                return;
            }

            const rTempEl = document.getElementById('room-temp');
            const rHumEl = document.getElementById('room-hum');
            
            const rTemp = rTempEl.value;
            const rHum = rHumEl.value;
            
            if (!rTemp || !rHum) {
                alert("กรุณากรอก อุณหภูมิ และ ความชื้นของห้องให้ครบถ้วนครับ");
                return;
            }

            // --- โค้ดที่เพิ่มใหม่: เช็คว่าช่องห้องเป็นสีดำหรือไม่ ---
            if (rTempEl.classList.contains('input-error') || rHumEl.classList.contains('input-error')) {
                alert("อุณหภูมิ หรือ ความชื้นของห้อง อยู่นอกช่วงที่อนุญาต (ช่องสีดำ) กรุณาตรวจสอบและห้ามบันทึกครับ");
                return;
            }
            
            if (!rTemp || !rHum) {
                alert("กรุณากรอก อุณหภูมิ และ ความชื้นของห้องให้ครบถ้วนครับ");
                return;
            }


            

            let equipsData = {};
            let equipArray = []; // เปลี่ยนจาก String เป็น Array เพื่อส่งไปแยกแถว
            
            let isMissingValue = false;
            let isInvalidValue = false;

            document.querySelectorAll('.equip-row').forEach(row => {
                let nameInput = row.querySelector('.eq-name');
                let tempInput = row.querySelector('.eq-temp');
                let n = nameInput.value.trim();
                let t = tempInput.value;
                
                if (n) {
                    if (t === '') {
                        isMissingValue = true;
                        tempInput.style.border = "2px solid red";
                    } else {
                        tempInput.style.border = "1px solid #ccc";
                        equipsData[n] = t;
                        equipArray.push({ name: n, temp: t }); // เก็บเป็น Object ลง Array
                        
                        const rules = getValidationRules(n);
                        if (rules) {
                            const val = parseFloat(t);
                            if (val < rules.minAllow || val > rules.maxAllow) {
                                isInvalidValue = true;
                            }
                        }
                    }
                }
            });

            if (isMissingValue) {
                alert("คุณยังกรอกอุณหภูมิเครื่องมือไม่ครบทุกชิ้น กรุณาตรวจสอบและกรอกให้ครบครับ");
                return;
            }

            if (isInvalidValue) {
                alert("มีอุณหภูมิเครื่องมืออยู่นอกช่วงที่อนุญาต (ช่องสีดำ) กรุณาตรวจสอบความถูกต้องและห้ามบันทึกครับ");
                return;
            }

            const actionText = document.getElementById('room-action').value.trim();

            clearInterval(lockTimer);
            showOverlay("กำลังส่งข้อมูล...");
            
            const payload = {
                room: currentEditingRoom,
                user: currentUser,
                session: currentSessionName,
                rTemp: rTemp,
                rHum: rHum,
                equipments: equipArray, // ส่งข้อมูลเป็น Array
                remark: actionText
            };

            // โค้ดส่ง fetch ด้านล่างปล่อยไว้เหมือนเดิมครับ ...

            sessionData[currentEditingRoom] = {
                rTemp: rTemp, rHum: rHum, equips: equipsData, action: actionText
            };

            try {
                const url = `${SCRIPT_URL}?action=save&data=${encodeURIComponent(JSON.stringify(payload))}`;
                const response = await fetch(url);
                const result = await response.text();
                
                if(result === "Success") {
                    alert("✅ บันทึกข้อมูลสำเร็จ!");
                    currentEditingRoom = null;
                    showDashboard();
                } else {
                    alert("บันทึกไม่สำเร็จ: " + result);
                }
            } catch(e) {
                alert("การเชื่อมต่อมีปัญหา กรุณาลองอีกครั้ง");
            }
            hideOverlay();
        }

        window.onload = function() {
            checkSession();
            
            const savedUser = localStorage.getItem('lab_logged_in_user');
            if (savedUser) {
                currentUser = savedUser;
                showDashboard();
            } else {
                document.getElementById('view-login').style.display = 'flex';
                document.getElementById('view-dashboard').style.display = 'none';
            }
        };
    </script>
</body>
</html>
