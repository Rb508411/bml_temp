<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึก Lab อัจฉริยะ (Multi-user)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 1.4rem; line-height: 1.4; }
        
        .session-banner {
            background-color: #f39c12;
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .session-banner.active-morn { background-color: #27ae60; }
        .session-banner.active-eve { background-color: #8e44ad; }
        .session-banner.inactive { background-color: #c0392b; }

        .content {
            padding: 20px;
            flex-grow: 1;
        }

        .recorder-info {
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .recorder-info input {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
            margin-top: 5px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .room-card {
            background-color: #fff;
            border: 2px solid #bdc3c7;
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .room-card:hover:not(.disabled) {
            border-color: #3498db;
            background-color: #ebf5fb;
            transform: translateY(-3px);
        }
        .room-card.disabled { cursor: not-allowed; opacity: 0.8; }
        
        .room-card.completed { border-color: #2ecc71; background-color: #eafaf1; }
        .room-card.completed h3 { color: #27ae60; }
        .room-card.completed .status-badge { background-color: #2ecc71; }
        
        .room-card.locked { border-color: #e67e22; background-color: #fdf2e9; }
        .room-card.locked h3 { color: #d35400; }
        .room-card.locked .status-badge { background-color: #e67e22; }

        .room-icon { font-size: 1.8rem; margin-bottom: 8px; }
        .room-card h3 { margin: 0; font-size: 1rem; color: #2c3e50; line-height: 1.3;}
        .status-badge {
            font-size: 0.8rem;
            margin-top: 8px;
            padding: 4px 10px;
            border-radius: 12px;
            background-color: #bdc3c7;
            color: white;
            line-height: 1.2;
        }

        #view-room { display: none; }
        .back-btn {
            background: none; border: none; color: #3498db; font-size: 1rem;
            font-weight: bold; cursor: pointer; padding: 0; margin-bottom: 15px;
        }
        .back-btn:hover { text-decoration: underline; }
        
        .room-header {
            font-size: 1.3rem; color: #2c3e50; border-bottom: 2px solid #3498db;
            padding-bottom: 10px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center; font-weight:bold;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        .form-group input {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 6px; box-sizing: border-box; font-size: 1rem;
        }
        
        .section-title {
            background-color: #ecf0f1; padding: 8px 10px;
            border-left: 4px solid #e67e22; margin: 25px 0 15px 0;
            font-weight: bold; color: #d35400;
            display: flex; justify-content: space-between; align-items: center;
        }

        .add-equip-btn {
            background-color: #f39c12; color: white; border: none; padding: 6px 12px;
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.85rem;
        }
        .add-equip-btn:hover { background-color: #e67e22; }
        
        .equip-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-remove-eq {
            background: #e74c3c; color: white; border: none; border-radius: 5px;
            cursor: pointer; padding: 0 12px; font-size: 1.2rem; display:flex; align-items:center; justify-content:center;
        }
        .btn-remove-eq:hover { background: #c0392b; }

        .action-buttons { display: flex; gap: 10px; margin-top: 30px; }
        .btn-save { flex: 2; background-color: #2ecc71; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn-cancel { flex: 1; background-color: #e74c3c; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        #overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.9); display: none;
            justify-content: center; align-items: center; flex-direction: column;
            z-index: 9999;
        }
        .spinner {
            border: 5px solid #f3f3f3; border-top: 5px solid #3498db;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 400px) {
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="overlay">
            <div class="spinner"></div>
            <h2 id="overlay-text" style="color:#2c3e50;">กำลังเชื่อมต่อเซิร์ฟเวอร์...</h2>
        </div>

        <div class="header">
            <h1>🌡️ ระบบบันทึกอุณหภูมิและความชื้น<br><small style="font-weight:normal; font-size:1rem;">Molecular Laboratory</small></h1>
        </div>
        <div id="session-banner" class="session-banner">กำลังตรวจสอบเวลา...</div>

        <div class="content">
            <!-- ================= VIEW 1: DASHBOARD ================= -->
            <div id="view-dashboard">
                <div class="recorder-info">
                    <label style="font-weight:bold; color:#2c3e50;">👤 ชื่อผู้รับผิดชอบ (บังคับกรอก):</label>
                    <input type="text" id="recorderName" placeholder="ระบุชื่อเจ้าหน้าที่" onchange="saveRecorderName()">
                </div>
                
                <h3 style="margin-top:0;">เลือกห้องปฏิบัติการ</h3>
                <div class="grid-container" id="room-grid">
                    <!-- จะถูกสร้างด้วย JavaScript -->
                </div>
            </div>

            <!-- ================= VIEW 2: ROOM FORM ================= -->
            <div id="view-room">
                <div class="room-header">
                    <span id="room-title">Lab X</span>
                    <span id="timer" style="font-size: 1rem; color: #e74c3c;">⏱️ 05:00</span>
                </div>
                
                <form id="room-form">
                    <div class="form-group">
                        <label>🌡️ อุณหภูมิห้อง (°C) <span style="color:red;">*</span></label>
                        <input type="number" id="room-temp" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label>💧 ความชื้นห้อง (%) <span style="color:red;">*</span></label>
                        <input type="number" id="room-hum" step="0.1" required>
                    </div>

                    <div class="section-title">
                        <span>เครื่องมือในห้อง</span>
                        <button type="button" class="add-equip-btn" onclick="addEquipField()">+ เพิ่มเครื่อง</button>
                    </div>
                    
                    <div id="equip-container">
                        <!-- กล่องใส่เครื่องมือแบบไดนามิก จะถูกสร้างตาม LAB_CONFIG -->
                    </div>
                    
                    <!-- ส่วนแจ้งเตือนการแก้ไข (Out of range) -->
                    <div class="form-group" style="margin-top: 20px; background-color: #fdf2e9; padding: 15px; border-radius: 8px; border-left: 4px solid #e67e22;">
                        <label style="color: #d35400;">⚠️ ค่าเกินเกณฑ์ที่ยอมรับหรือไม่? (ถ้าเกินระบุการแก้ไข)</label>
                        <input type="text" id="room-action" placeholder="เช่น อุณหภูมิตู้เย็นเกินเกณฑ์ -> ปรับอุณหภูมิและแจ้งช่าง">
                    </div>

                    <div class="action-buttons">
                        <button type="button" class="btn-cancel" onclick="cancelRoom()">ยกเลิก / ปลดล็อก</button>
                        <button type="button" class="btn-save" onclick="saveRoom()">💾 บันทึกและส่งข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // *** ให้นำ URL ของ Google Apps Script มาใส่ตรงนี้ ***exec
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWYzohslXOIFKacZ_4UcFQrJ5WL_FE8FWuresqT3_TkpciFBrGXM_wIY1a2l5A5TE/exec";

        // =========================================================================
        // 🛠️ ตั้งค่าเครื่องมือประจำห้อง (สามารถเพิ่มแก้ไขชื่อเครื่องมือในแต่ละห้องได้ที่นี่)
        // =========================================================================
        const LAB_CONFIG = {
            "Cobas 4800 Zone": ["ตู้เย็น (BML-MOL-139)"],
            "Post PCR Room": [], // ถ้าไม่มี ให้เว้นว่างไว้แบบนี้
            "PCR Room I (หน้าห้อง Post PCR)": [],
            "PCR Mix Room": [],
            "PCR Room I (หน้าห้อง MMX)": [],
            "MMX Room": [],
            "Sample Preparation Room": [],
            "BSL-2 Room": [],
            "Stock Room": [],
            "PCR Room II": [],
            "Cobas 6800 Room": [],
            "Library Preparation": [],
            "Sequencing Room": [],
            "Analysis Room": []
        };
        // =========================================================================

        let currentSessionName = null;
        let currentEditingRoom = null;
        let refreshInterval = null;
        let lockTimer = null;
        let sessionData = {}; // เก็บข้อมูลจำในเครื่องเผื่อเปิดดูอีกรอบ
        
        function showOverlay(text) {
            document.getElementById('overlay-text').innerText = text;
            document.getElementById('overlay').style.display = 'flex';
        }
        function hideOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }

        function checkSession() {
            const now = new Date();
            const hour = now.getHours();
            const banner = document.getElementById('session-banner');
            
            if (hour >= 6 && hour < 12) {
                currentSessionName = "MORN";
                banner.innerText = "☀️ เปิดรับข้อมูลรอบ 06:00 - 11:59 น.";
                banner.className = "session-banner active-morn";
            } else if (hour >= 15 && hour < 23) {
                currentSessionName = "EVE";
                banner.innerText = "🌙 เปิดรับข้อมูลรอบ 15:00 - 22:59 น.";
                banner.className = "session-banner active-eve";
            } else {
                currentSessionName = null;
                banner.innerText = "🚫 นอกเวลาการบันทึก (รับเฉพาะ 06-11 น. และ 15-22 น.)";
                banner.className = "session-banner inactive";
            }
        }

        async function fetchRoomStatus() {
            if (!currentSessionName) return; 
            try {
                const url = `${SCRIPT_URL}?action=getStatus&session=${currentSessionName}`;
                const response = await fetch(url);
                const statusData = await response.json();
                renderGrid(statusData);
            } catch (error) {
                console.error("Error fetching status", error);
            }
        }

        function renderGrid(statusData = {}) {
            const grid = document.getElementById('room-grid');
            grid.innerHTML = '';
            const isOutOfTime = (currentSessionName === null);
            const rooms = Object.keys(LAB_CONFIG);

            for (let i = 0; i < rooms.length; i++) {
                const roomName = rooms[i];
                const roomInfo = statusData[roomName] || { status: 'Available', user: '' };
                
                const card = document.createElement('div');
                let icon = '🚪';
                let badgeText = 'ว่าง';
                card.className = 'room-card';

                if (isOutOfTime) {
                    card.classList.add('disabled');
                    card.onclick = () => alert("หมดเวลาบันทึกผลแล้วครับ");
                } 
                else if (roomInfo.status === 'Completed') {
                    card.classList.add('completed', 'disabled');
                    icon = '✅';
                    badgeText = `บันทึกแล้ว<br><small>โดย ${roomInfo.user}</small>`;
                    card.onclick = () => alert(`ห้องนี้ถูกบันทึกแล้วโดย ${roomInfo.user} ครับ`);
                } 
                else if (roomInfo.status === 'Locked') {
                    card.classList.add('locked', 'disabled');
                    icon = '🔒';
                    badgeText = `กำลังจด...<br><small>โดย ${roomInfo.user}</small>`;
                    card.onclick = () => alert(`ห้องนี้กำลังถูกจดบันทึกโดย ${roomInfo.user} โปรดรอสักครู่ครับ`);
                } 
                else {
                    card.onclick = () => requestLockRoom(roomName);
                }

                card.innerHTML = `
                    <div class="room-icon">${icon}</div>
                    <h3>${roomName}</h3>
                    <div class="status-badge">${badgeText}</div>
                `;
                grid.appendChild(card);
            }
        }

        function saveRecorderName() {
            localStorage.setItem('lab_recorder_name', document.getElementById('recorderName').value);
        }

        async function requestLockRoom(roomName) {
            const userName = document.getElementById('recorderName').value.trim();
            if (!userName) {
                alert("กรุณากรอกชื่อผู้รับผิดชอบก่อนกดเข้าห้องครับ");
                document.getElementById('recorderName').focus();
                return;
            }
            
            showOverlay(`กำลังเปิดห้อง...`);
            try {
                const url = `${SCRIPT_URL}?action=lock&room=${encodeURIComponent(roomName)}&user=${encodeURIComponent(userName)}&session=${currentSessionName}`;
                const response = await fetch(url);
                const result = await response.text();
                
                if (result === "Success") {
                    openRoomForm(roomName);
                } else {
                    alert(result); 
                    fetchRoomStatus(); 
                }
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
            }
            hideOverlay();
        }

        function addEquipField(name = '', temp = '') {
            const container = document.getElementById('equip-container');
            const div = document.createElement('div');
            div.className = 'equip-row';
            div.innerHTML = `
                <input type="text" placeholder="ชื่อเครื่อง" value="${name}" class="eq-name" style="flex: 3;">
                <input type="number" step="0.1" placeholder="°C" value="${temp}" class="eq-temp" style="flex: 2;">
                <button type="button" class="btn-remove-eq" onclick="this.parentElement.remove()">✖</button>
            `;
            container.appendChild(div);
        }

        function openRoomForm(roomName) {
            currentEditingRoom = roomName;
            document.getElementById('room-title').innerText = `${roomName}`;
            
            // โหลดข้อมูลเก่าที่จำไว้ในเครื่อง หรือเคลียร์ให้ว่าง
            const data = sessionData[roomName] || {};
            document.getElementById('room-temp').value = data.rTemp || '';
            document.getElementById('room-hum').value = data.rHum || '';
            document.getElementById('room-action').value = data.action || '';
            
            const container = document.getElementById('equip-container');
            container.innerHTML = '';
            
            // ผสมรายชื่อเครื่องมือเริ่มต้นจาก Config เข้ากับที่คนอาจจะแอบกดเพิ่มไว้
            const savedEquips = data.equips || {};
            const defaultEquips = LAB_CONFIG[roomName] || [];
            
            let equipNames = Array.from(new Set([...defaultEquips, ...Object.keys(savedEquips)]));
            
            equipNames.forEach(eqName => {
                addEquipField(eqName, savedEquips[eqName] || '');
            });

            document.getElementById('view-dashboard').style.display = 'none';
            document.getElementById('view-room').style.display = 'block';
            
            clearInterval(refreshInterval);
            startLockTimer();
        }

        function startLockTimer() {
            let timeLeft = 300; 
            const timerEl = document.getElementById('timer');
            
            clearInterval(lockTimer);
            lockTimer = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const s = (timeLeft % 60).toString().padStart(2, '0');
                timerEl.innerText = `⏱️ ${m}:${s}`;
                
                if (timeLeft <= 0) {
                    clearInterval(lockTimer);
                    alert("หมดเวลาการจดบันทึก (5 นาที) ระบบจะปลดล็อกห้องนี้อัตโนมัติครับ");
                    cancelRoom(); 
                }
            }, 1000);
        }

        async function cancelRoom() {
            clearInterval(lockTimer);
            showOverlay("กำลังปลดล็อกห้อง...");
            try {
                const url = `${SCRIPT_URL}?action=unlock&room=${encodeURIComponent(currentEditingRoom)}&session=${currentSessionName}`;
                await fetch(url);
            } catch(e) { console.error(e); }
            
            currentEditingRoom = null;
            document.getElementById('view-room').style.display = 'none';
            document.getElementById('view-dashboard').style.display = 'block';
            
            hideOverlay();
            fetchRoomStatus();
            refreshInterval = setInterval(fetchRoomStatus, 3000);
        }

        async function saveRoom() {
            const rTemp = document.getElementById('room-temp').value;
            const rHum = document.getElementById('room-hum').value;
            
            if (!rTemp || !rHum) {
                alert("กรุณากรอก อุณหภูมิ และ ความชื้นของห้องให้ครบถ้วนครับ");
                return;
            }

            let equipsData = {};
            let equipStrings = [];
            document.querySelectorAll('.equip-row').forEach(row => {
                let n = row.querySelector('.eq-name').value.trim();
                let t = row.querySelector('.eq-temp').value;
                if (n) {
                    equipsData[n] = t;
                    equipStrings.push(`${n}=${t ? t + '°C' : '-'}`);
                }
            });
            const actionText = document.getElementById('room-action').value.trim();

            clearInterval(lockTimer);
            showOverlay("กำลังส่งข้อมูล...");
            
            const payload = {
                room: currentEditingRoom,
                user: document.getElementById('recorderName').value,
                session: currentSessionName,
                rTemp: rTemp,
                rHum: rHum,
                equipments: equipStrings.join(', '), 
                remark: actionText
            };

            // จำข้อมูลไว้ในเครื่องเผื่อเน็ตหลุด
            sessionData[currentEditingRoom] = {
                rTemp: rTemp, rHum: rHum, equips: equipsData, action: actionText
            };

            try {
                const url = `${SCRIPT_URL}?action=save&data=${encodeURIComponent(JSON.stringify(payload))}`;
                const response = await fetch(url);
                const result = await response.text();
                
                if(result === "Success") {
                    alert("✅ บันทึกข้อมูลสำเร็จ!");
                    currentEditingRoom = null;
                    document.getElementById('view-room').style.display = 'none';
                    document.getElementById('view-dashboard').style.display = 'block';
                    fetchRoomStatus();
                    refreshInterval = setInterval(fetchRoomStatus, 3000);
                } else {
                    alert("บันทึกไม่สำเร็จ: " + result);
                }
            } catch(e) {
                alert("การเชื่อมต่อมีปัญหา กรุณาลองอีกครั้ง");
            }
            hideOverlay();
        }

        window.onload = function() {
            document.getElementById('recorderName').value = localStorage.getItem('lab_recorder_name') || '';
            checkSession();
            renderGrid();
            fetchRoomStatus(); 
            
            refreshInterval = setInterval(() => {
                checkSession();
                fetchRoomStatus();
            }, 3000);
        };
    </script>
</body>
</html>
