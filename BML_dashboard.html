<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard อุณหภูมิและความชื้น</title>
    <!-- โหลด Libraries ที่จำเป็น -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; background-color: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { text-align: center; color: #2c3e50; margin-top: 0; }
        
        .controls, .export-controls { display: flex; gap: 15px; flex-wrap: wrap; background-color: #ecf0f1; padding: 15px; border-radius: 8px; margin-bottom: 20px; align-items: center; }
        select, input[type="email"] { padding: 10px; border-radius: 5px; border: 1px solid #bdc3c7; font-size: 1rem; flex: 1; min-width: 150px; }
        .btn-export { background-color: #27ae60; color: white; border: none; padding: 10px 20px; font-size: 1rem; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn-export:hover { background-color: #219150; }
        
        .chart-container { position: relative; height: 50vh; width: 100%; margin-bottom: 20px; }
        #loading { text-align: center; color: #e67e22; font-weight: bold; font-size: 1.2rem; display: none; margin: 20px 0; }
        
        /* สไตล์ตารางข้อมูลดิบ */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; text-align: center; }
        .data-table th { background-color: #34495e; color: white; padding: 10px; border: 1px solid #bdc3c7; }
        .data-table td { padding: 8px; border: 1px solid #bdc3c7; }
        .data-table tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Dashboard อุณหภูมิและความชื้น</h1>
    
    <!-- ส่วนเลือกข้อมูล -->
    <div class="controls">
        <select id="viewType" onchange="updateSubFilter()">
            <option value="room">🌡️ ดูอุณหภูมิ/ความชื้นห้อง</option>
            <option value="equip">🔬 ดูอุณหภูมิเครื่องมือ (แยกรุ่น)</option>
        </select>
        
        <select id="subFilter" onchange="renderChart()">
            <option value="">-- กรุณารอโหลดข้อมูล --</option>
        </select>
    </div>

    <!-- ส่วน Export Data -->
    <div class="export-controls">
        <h4 style="margin:0; color:#34495e;">📤 ส่งออก:</h4>
        <select id="export-format">
            <option value="pdf">PDF (กราฟ + ตาราง)</option>
            <option value="excel">Excel (ตารางอย่างเดียว)</option>
        </select>
        <select id="export-method" onchange="toggleEmail()">
            <option value="download">📥 บันทึกลงเครื่อง</option>
            <option value="email">📧 ส่งผ่านอีเมล</option>
        </select>
        <input type="email" id="export-email" placeholder="ระบุอีเมลผู้รับ..." style="display:none;">
        <button class="btn-export" onclick="handleExport()">ส่งออกข้อมูล</button>
    </div>

    <div id="loading">⏳ กำลังประมวลผล...</div>
    
    <!-- พื้นที่ที่จะถูกปริ้นท์เป็น PDF -->
    <div id="export-content" style="padding: 10px; background: white;">
        <h3 id="report-title" style="text-align: center; display: none; color: #2c3e50;">รายงานข้อมูล</h3>
        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>
        <div id="data-table-container"></div>
    </div>
</div>

<script>
    // *** ให้นำ URL ของ Google Apps Script มาใส่ตรงนี้ ***
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWYzohslXOIFKacZ_4UcFQrJ5WL_FE8FWuresqT3_TkpciFBrGXM_wIY1a2l5A5TE/exec";
    
    let rawData = [];
    let rooms = new Set();
    let equipments = new Set();
    let myChart = null;

    // ตัวแปรพักข้อมูลไว้สำหรับ Export
    let currentLabels = [];
    let currentData1 = [];
    let currentData2 = [];
    let currentLabel1 = "";
    let currentLabel2 = "";

    async function loadData() {
        showLoading("กำลังดึงข้อมูลจากฐานข้อมูล...");
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getDashboardData`);
            rawData = await res.json();
            processFilters();
        } catch (e) {
            alert("ดึงข้อมูลไม่สำเร็จ กรุณาลองใหม่ครับ");
        }
        hideLoading();
    }

    function processFilters() {
        rooms.clear();
        equipments.clear();
        
        rawData.forEach(row => {
            if (row.room) rooms.add(row.room);
            if (row.equipments) {
                let items = row.equipments.split(',');
                items.forEach(item => {
                    let parts = item.split('=');
                    if (parts.length === 2) {
                        equipments.add(parts[0].trim());
                    }
                });
            }
        });
        updateSubFilter();
    }

    function updateSubFilter() {
        const viewType = document.getElementById('viewType').value;
        const subFilter = document.getElementById('subFilter');
        subFilter.innerHTML = '';

        let options = viewType === 'room' ? Array.from(rooms).sort() : Array.from(equipments).sort();

        options.forEach(opt => {
            const el = document.createElement('option');
            el.value = opt;
            el.innerText = opt;
            subFilter.appendChild(el);
        });

        if (options.length > 0) renderChart();
    }

    function renderChart() {
        const viewType = document.getElementById('viewType').value;
        const selectedTarget = document.getElementById('subFilter').value;
        if (!selectedTarget) return;

        currentLabels = [];
        currentData1 = [];
        currentData2 = [];

        if (viewType === 'room') {
            currentLabel1 = 'อุณหภูมิห้อง (°C)';
            currentLabel2 = 'ความชื้น (%)';
            rawData.forEach(row => {
                if (row.room === selectedTarget) {
                    currentLabels.push(row.timestamp);
                    currentData1.push(row.rTemp);
                    currentData2.push(row.rHum);
                }
            });
        } else {
            currentLabel1 = `อุณหภูมิ ${selectedTarget} (°C)`;
            rawData.forEach(row => {
                if (row.equipments && row.equipments.includes(selectedTarget)) {
                    let items = row.equipments.split(',');
                    items.forEach(item => {
                        let parts = item.split('=');
                        if (parts.length === 2 && parts[0].trim() === selectedTarget) {
                            let valStr = parts[1].replace('°C', '').trim();
                            let val = parseFloat(valStr);
                            if (!isNaN(val)) {
                                currentLabels.push(row.timestamp);
                                currentData1.push(val);
                            }
                        }
                    });
                }
            });
        }

        drawChart(viewType);
        renderDataTable(viewType);
        document.getElementById('report-title').innerText = `รายงานผล: ${selectedTarget}`;
    }

    function drawChart(type) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();

        const datasets = [{
            label: currentLabel1,
            data: currentData1,
            borderColor: '#e74c3c',
            backgroundColor: 'rgba(231, 76, 60, 0.1)',
            borderWidth: 2,
            tension: 0.3,
            fill: true
        }];

        if (type === 'room') {
            datasets.push({
                label: currentLabel2,
                data: currentData2,
                borderColor: '#3498db',
                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                borderWidth: 2,
                tension: 0.3,
                fill: true
            });
        }

        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: currentLabels, datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { x: { ticks: { maxRotation: 45, minRotation: 45 } } },
                animation: false // ปิด Animation เพื่อให้ถ่ายรูปทำ PDF ได้ทันที
            }
        });
    }

    // สร้างตารางข้อมูลดิบเพื่อแสดงใน PDF
    function renderDataTable(type) {
        let tableHTML = '<table class="data-table">';
        tableHTML += `<tr><th>เวลา (Timestamp)</th><th>${currentLabel1}</th>`;
        if (type === 'room') tableHTML += `<th>${currentLabel2}</th>`;
        tableHTML += '</tr>';

        for (let i = 0; i < currentLabels.length; i++) {
            tableHTML += `<tr><td>${currentLabels[i]}</td><td>${currentData1[i]}</td>`;
            if (type === 'room') tableHTML += `<td>${currentData2[i]}</td>`;
            tableHTML += '</tr>';
        }
        tableHTML += '</table>';
        document.getElementById('data-table-container').innerHTML = tableHTML;
    }

    function toggleEmail() {
        const method = document.getElementById('export-method').value;
        const emailInput = document.getElementById('export-email');
        emailInput.style.display = method === 'email' ? 'block' : 'none';
    }

    // ================= ระบบ Export และบันทึก Log =================
    async function handleExport() {
        const format = document.getElementById('export-format').value;
        const method = document.getElementById('export-method').value;
        const email = document.getElementById('export-email').value;
        const target = document.getElementById('subFilter').value;

        if (method === 'email' && !email) {
            alert("กรุณาระบุอีเมลปลายทางที่ต้องการให้ระบบส่งไฟล์ไปครับ");
            return;
        }

        showLoading("กำลังสร้างไฟล์และบันทึกประวัติ...");
        try {
            if (format === 'pdf') {
                document.getElementById('report-title').style.display = 'block'; // แสดงหัวข้อรายงานเฉพาะตอนปริ้น
                const element = document.getElementById('export-content');
                const opt = {
                    margin: 0.5,
                    filename: `Report_${target}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
                };

                if (method === 'download') {
                    await html2pdf().set(opt).from(element).save();
                    await sendLogToBackend(target, format, method, "");
                } else {
                    const pdfBase64 = await html2pdf().set(opt).from(element).outputPdf('datauristring');
                    const b64Data = pdfBase64.split(',')[1];
                    await sendLogToBackend(target, format, method, email, b64Data, "application/pdf", `Report_${target}.pdf`);
                }
                document.getElementById('report-title').style.display = 'none';

            } else if (format === 'excel') {
                let ws_data = [];
                const viewType = document.getElementById('viewType').value;
                
                if (viewType === 'room') {
                    ws_data.push(["เวลา (Timestamp)", "อุณหภูมิห้อง (°C)", "ความชื้น (%)"]);
                    for(let i=0; i<currentLabels.length; i++) ws_data.push([currentLabels[i], currentData1[i], currentData2[i]]);
                } else {
                    ws_data.push(["เวลา (Timestamp)", currentLabel1]);
                    for(let i=0; i<currentLabels.length; i++) ws_data.push([currentLabels[i], currentData1[i]]);
                }

                var ws = XLSX.utils.aoa_to_sheet(ws_data);
                var wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Data");

                if (method === 'download') {
                    XLSX.writeFile(wb, `Report_${target}.xlsx`);
                    await sendLogToBackend(target, format, method, "");
                } else {
                    const excelBase64 = XLSX.write(wb, {type: 'base64', bookType: 'xlsx'});
                    await sendLogToBackend(target, format, method, email, excelBase64, "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", `Report_${target}.xlsx`);
                }
            }
            alert("✅ ดำเนินการส่งออกข้อมูลเรียบร้อยแล้วครับ");
        } catch(e) {
            alert("เกิดข้อผิดพลาดในการส่งออก: " + e.message);
        }
        hideLoading();
    }

    async function sendLogToBackend(target, format, method, email, fileBase64 = null, mimeType = null, fileName = null) {
        const payload = {
            action: "exportLog",
            target: target,
            format: format,
            method: method,
            email: email,
            fileBase64: fileBase64,
            mimeType: mimeType,
            fileName: fileName
        };

        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
    }

    function showLoading(text) {
        const loader = document.getElementById('loading');
        loader.innerText = text;
        loader.style.display = 'block';
    }
    
    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
    }

    window.onload = loadData;
</script>
</body>
</html>
